version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: finalmate-postgres
    environment:
      POSTGRES_USER: finalmate
      POSTGRES_PASSWORD: finalmate
      POSTGRES_DB: finalmate
    ports:
      - "5432:5432"
    volumes:
      - finalmate_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: finalmate-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: finalmate-qdrant
    ports:
      - "6333:6333"
    volumes:
      - finalmate_qdrant:/qdrant/storage

volumes:
  finalmate_postgres:
  finalmate_qdrant:
